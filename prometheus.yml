global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: fastapi
    static_configs:
      - targets:
          - network-monitor:8000

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
